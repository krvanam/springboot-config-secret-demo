## Server configuration
# The server port is set to 8080 to align with the Kubernetes service
server.port=8080

## Spring application name
# This property isn't used directly in the code but sets the Spring
# application name, which can be useful for logging and management
# endpoints. It also influences actuator endpoints if included.
spring.application.name=springboot-config-secret-demo

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect